version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: football_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: football_analytics
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123

volumes:
  clickhouse_data: